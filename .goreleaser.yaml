# ==============================================================================
# .goreleaser.yaml — cpp-gen
# ==============================================================================
# Documentation: https://goreleaser.com/customization/
#
# Trigger:
#   goreleaser release --clean          → full release (CI)
#   goreleaser release --snapshot --clean → local build without publishing
# ==============================================================================

version: 2

# ── Project metadata ─────────────────────────────────────────────────────────

project_name: cpp-gen

# ── Pre-build hooks ───────────────────────────────────────────────────────────

before:
  hooks:
    - go mod tidy
    - go mod verify

# ── Global environment variables ─────────────────────────────────────────────

env:
  - CGO_ENABLED=0

# ── Builds ────────────────────────────────────────────────────────────────────

builds:
  - id: cpp-gen
    main: .
    binary: cpp-gen

    goos:
      - linux
      - darwin

    goarch:
      - amd64
      - "386"

    # darwin/386 is not supported since Go 1.15 / macOS Catalina
    ignore:
      - goos: darwin
        goarch: "386"

    # Compilation flags
    flags:
      - -trimpath

    # Injects version, date and commit into the binary — same variables as the Makefile.
    # NOTE: AppVersion, BuildDate and GitCommit must be declared as
    # `var` (not `const`) in cmd/root.go for the injection to work.
    ldflags:
      - -s -w
      - -X github.com/matpdev/cpp-gen/cmd.AppVersion={{.Version}}
      - -X github.com/matpdev/cpp-gen/cmd.BuildDate={{.Date}}
      - -X github.com/matpdev/cpp-gen/cmd.GitCommit={{.ShortCommit}}

# ── Archives ──────────────────────────────────────────────────────────────────

archives:
  - id: default
    format: tar.gz
    # cpp-gen_1.2.3_linux_amd64.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

# ── Checksums ─────────────────────────────────────────────────────────────────

checksum:
  name_template: checksums.txt
  algorithm: sha256

# ── AUR ───────────────────────────────────────────────────────────────────────
# Publishes the PKGBUILD automatically to the Arch User Repository after release.
#
# Prerequisites:
#   1. Create an account at https://aur.archlinux.org
#   2. Generate an SSH key pair: ssh-keygen -t ed25519 -f ~/.ssh/aur
#   3. Add the public key to your AUR account: https://aur.archlinux.org/account/
#   4. Register the package with an initial push (branch MUST be master):
#        git -c init.defaultBranch=master clone ssh://aur@aur.archlinux.org/cpp-gen-bin.git
#        cp aur/PKGBUILD aur/.SRCINFO aur/LICENSE <cloned-dir>/
#        cd <cloned-dir> && git add PKGBUILD .SRCINFO LICENSE && git commit -m "Initial release" && git push
#   5. Add the private key as a GitHub repository secret named AUR_KEY
#
# Note: The AUR only accepts pushes to the `master` branch.
# See: https://goreleaser.com/customization/aur/

aurs:
  - name: cpp-gen-bin
    homepage: "https://github.com/matpdev/cpp-gen"
    description: "Modern C++ project generator with CMake, package managers, IDE configurations and development tools."
    maintainers:
      - "matpdev <matheus2ep at gmail dot com>"
    license: MIT
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/cpp-gen-bin.git"
    provides:
      - cpp-gen
    conflicts:
      - cpp-gen
    package: |-
      install -Dm755 "./cpp-gen"   "${pkgdir}/usr/bin/cpp-gen"
      install -Dm644 "./LICENSE"   "${pkgdir}/usr/share/licenses/cpp-gen-bin/LICENSE"
      install -Dm644 "./README.md" "${pkgdir}/usr/share/doc/cpp-gen-bin/README.md"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

# ── Changelog ─────────────────────────────────────────────────────────────────
# Generated from commit messages following the Conventional Commits convention.

changelog:
  use: git
  sort: asc

  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"

  groups:
    - title: "💥 Breaking Changes"
      regexp: '^.*!(\(.+\))?:.*'
      order: 0
    - title: "⚡ Novas Funcionalidades"
      regexp: "^feat"
      order: 1
    - title: "🐛 Correções"
      regexp: "^fix"
      order: 2
    - title: "🚀 Performance"
      regexp: "^perf"
      order: 3
    - title: "♻️  Refatorações"
      regexp: "^refactor"
      order: 4
    - title: "🔧 Outros"
      order: 999

# ── GitHub Release ────────────────────────────────────────────────────────────

release:
  # Automatically detects pre-release by semver suffixes (e.g.: v1.0.0-beta.1)
  prerelease: auto

  # false = publishes immediately; true = saves as draft
  draft: false

  name_template: "v{{.Version}}"

  header: |
    ## cpp-gen v{{.Version}}

    Gerador moderno de projetos C++ com CMake, VCPKG, FetchContent e suporte a múltiplas IDEs.

  footer: |
    ---

    ### Instalação

    **Arch Linux (AUR)**
    ```sh
    yay -S cpp-gen-bin
    ```

    **Linux / macOS — manual**
    ```sh
    # Exemplo para Linux x86_64
    curl -LO https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/cpp-gen/releases/download/v{{.Version}}/cpp-gen_{{.Version}}_linux_amd64.tar.gz
    tar -xzf cpp-gen_{{.Version}}_linux_amd64.tar.gz
    install -m755 cpp-gen ~/.local/bin/
    ```

    > **Verifique o checksum:** `sha256sum -c checksums.txt`
